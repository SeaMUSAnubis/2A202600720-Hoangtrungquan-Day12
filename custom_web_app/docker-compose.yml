version: "3.8"

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - PORT=8000
    # Add env vars for API keys or OpenAI key if needed

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - BACKEND_HOST=backend
      - FRONTEND_HOST=frontend
    depends_on:
      - backend
      - frontend
