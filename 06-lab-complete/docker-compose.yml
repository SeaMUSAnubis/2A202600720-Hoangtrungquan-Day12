version: "3.8"
services:
  agent:
    build: .
    environment:
      - PORT=8000
      - REDIS_URL=redis://redis:6379/0
      - AGENT_API_KEY=my-secret-key
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - agent
